version: '3.9'
services:
    api:
        build: .
        ports:
            - '3000:3000'
        environment:
            - PORT=3000
            - DATABASE_URL=postgresql://postgres:postgres@db:5432/task_api
            - JWT_SECRET=change-me
        depends_on:
            - db
        restart: unless-stopped

    db:
        image: postgres:16-alpine
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_DB=task_api
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
