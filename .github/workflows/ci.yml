name: CI
on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Check formatting
              run: npm run format:check

    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Generate Prisma client
              run: npm run db:generate
            - name: Build project
              run: npm run build
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Generate Prisma client
              run: npm run db:generate
            - name: Run tests
              run: npm run test
